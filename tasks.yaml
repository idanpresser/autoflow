tasks:
  # =========================================================================
  # Phase 1: Core Foundation & UI Builder
  # =========================================================================
  - id: "task-p1-01"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Initialize the PySide6 MainWindow structure."
    prerequisites: []
    inputs: []
    outputs:
      - src/ui/main_window.py
      - tests/test_main_window.py
    tdd_instructions: |
      1. Write tests/test_main_window.py to test that MainWindow can be imported and instantiated.
      2. Verify that window title is set to 'AutoFlow' and initial window size is 800x600.
      3. Verify the tests fail when src/ui/main_window.py is empty (Red phase).
    implementation_details: |
      - Create src/ui/main_window.py.
      - Inherit MainWindow from PySide6.QtWidgets.QMainWindow.
      - Set window title using self.setWindowTitle("AutoFlow") and size using self.resize(800, 600) in __init__.
    verification: "pytest tests/test_main_window.py"

  - id: "task-p1-02"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Create the step list layout inside MainWindow."
    prerequisites: ["task-p1-01"]
    inputs:
      - src/ui/main_window.py
    outputs:
      - src/ui/main_window.py
      - tests/test_main_window.py
    tdd_instructions: |
      1. Add a test in tests/test_main_window.py that looks for a QListWidget child in the MainWindow.
      2. Verify the list widget can successfully receive and render list items (mock steps).
    implementation_details: |
      - Create a central QWidget, assign it a layout (e.g. QHBoxLayout or QVBoxLayout).
      - Add a QListWidget named 'step_list' to the layout.
      - Set the central widget of the QMainWindow to this layout.
    verification: "pytest tests/test_main_window.py"

  - id: "task-p1-03"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Create action addition buttons in the MainWindow UI."
    prerequisites: ["task-p1-02"]
    inputs:
      - src/ui/main_window.py
    outputs:
      - src/ui/main_window.py
      - tests/test_main_window.py
    tdd_instructions: |
      1. Write a test in tests/test_main_window.py verifying the existence of buttons: 'Add Type Text', 'Add Press Key', and 'Add Wait'.
      2. Simulate a click on each button and verify that a mock action data object is added to the QListWidget model.
    implementation_details: |
      - Add a QPushButton panel to the layout.
      - Connect button clicks to slots that prompt/generate action dictionaries (e.g. {"type": "type_text", "text": "hello"}) and append them to the step_list.
    verification: "pytest tests/test_main_window.py"

  - id: "task-p1-04"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Implement profile serialization to JSON dict inside config.py."
    prerequisites: []
    inputs: []
    outputs:
      - src/utils/config.py
      - tests/test_config.py
    tdd_instructions: |
      1. Create tests/test_config.py testing a function 'serialize_profile' with a profile dictionary.
      2. Verify that the output is a valid JSON string containing the profile_name, hotkey, and steps keys.
      3. Raise a custom ValidationError if the profile has missing or malformed keys.
    implementation_details: |
      - Create src/utils/config.py.
      - Define 'serialize_profile(profile_dict)' which validates fields using simple conditional checks and calls json.dumps().
    verification: "pytest tests/test_config.py"

  - id: "task-p1-05"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Implement save_profile_to_file inside config.py."
    prerequisites: ["task-p1-04"]
    inputs:
      - src/utils/config.py
    outputs:
      - src/utils/config.py
      - tests/test_config.py
    tdd_instructions: |
      1. Write a test in tests/test_config.py to save a mock profile dictionary using a temporary folder.
      2. Verify that a file named '{profile_name}.json' is written to disk and can be decoded back.
    implementation_details: |
      - Implement 'save_profile_to_file(profile_dict, folder_path)'.
      - Ensure folder_path is created using os.makedirs(..., exist_ok=True) before writing the file.
    verification: "pytest tests/test_config.py"

  - id: "task-p1-06"
    phase: "Phase 1: Core Foundation & UI Builder"
    description: "Implement load_profile_from_file inside config.py."
    prerequisites: ["task-p1-05"]
    inputs:
      - src/utils/config.py
    outputs:
      - src/utils/config.py
      - tests/test_config.py
    tdd_instructions: |
      1. Write a test in tests/test_config.py to write a mock profile to a temp file, then call 'load_profile_from_file(file_path)'.
      2. Verify that it returns the exact matching dictionary structure, throwing FileNotFoundError if path is invalid.
    implementation_details: |
      - Implement 'load_profile_from_file(file_path)' using json.load().
      - Perform schema validation on the loaded dictionary.
    verification: "pytest tests/test_config.py"

  # =========================================================================
  # Phase 2: The Execution Engine (Taskt-inspired)
  # =========================================================================
  - id: "task-p2-01"
    phase: "Phase 2: The Execution Engine (Taskt-inspired)"
    description: "Create WorkflowRunner QThread skeleton."
    prerequisites: []
    inputs: []
    outputs:
      - src/engine/runner.py
      - tests/test_runner.py
    tdd_instructions: |
      1. Create tests/test_runner.py verifying that WorkflowRunner can be instantiated with a list of steps.
      2. Verify the existence of PySide6 Qt Signals: step_finished(int), workflow_completed(str), and error_occurred(str).
    implementation_details: |
      - Create src/engine/runner.py.
      - Subclass WorkflowRunner from PySide6.QtCore.QThread.
      - Define step_finished = Signal(int), workflow_completed = Signal(str), error_occurred = Signal(str).
    verification: "pytest tests/test_runner.py"

  - id: "task-p2-02"
    phase: "Phase 2: The Execution Engine (Taskt-inspired)"
    description: "Implement step loop in WorkflowRunner run method."
    prerequisites: ["task-p2-01"]
    inputs:
      - src/engine/runner.py
    outputs:
      - src/engine/runner.py
      - tests/test_runner.py
    tdd_instructions: |
      1. Write a test feeding 3 dummy steps (e.g. type: 'dummy') to WorkflowRunner.
      2. Run the thread and verify that step_finished is emitted exactly 3 times with indexes 0, 1, and 2, followed by workflow_completed.
    implementation_details: |
      - In run(), iterate over self.steps with enumerate().
      - Inside the loop, check if self._is_running is True. If False, break.
      - Call step_finished.emit(index) for each completed step, and workflow_completed.emit("Success") on completion.
    verification: "pytest tests/test_runner.py"

  - id: "task-p2-03"
    phase: "Phase 2: The Execution Engine (Taskt-inspired)"
    description: "Highlight MainWindow list items during execution."
    prerequisites: ["task-p1-03", "task-p2-02"]
    inputs:
      - src/ui/main_window.py
      - src/engine/runner.py
    outputs:
      - src/ui/main_window.py
      - tests/test_main_window.py
    tdd_instructions: |
      1. Write a test checking that when a runner's step_finished signal is emitted, the MainWindow list widget updates the corresponding row background color (e.g., to green).
    implementation_details: |
      - In MainWindow, implement slot 'on_step_finished(index)'.
      - Fetch the QListWidgetItem at the index and set its background color or highlight status.
    verification: "pytest tests/test_main_window.py"

  - id: "task-p2-04"
    phase: "Phase 2: The Execution Engine (Taskt-inspired)"
    description: "Implement focus_window using pygetwindow in src/engine/actions.py."
    prerequisites: []
    inputs: []
    outputs:
      - src/engine/actions.py
      - tests/test_actions.py
    tdd_instructions: |
      1. Create tests/test_actions.py to test 'focus_window(title)'.
      2. Mock pygetwindow to simulate window found vs. window not found. Verify it raises RuntimeError on missing window.
    implementation_details: |
      - Create src/engine/actions.py.
      - Import pygetwindow. Find window using pygetwindow.getWindowsWithTitle(title).
      - If found, call win.activate() or win.restore(), otherwise raise RuntimeError.
    verification: "pytest tests/test_actions.py"

  - id: "task-p2-05"
    phase: "Phase 2: The Execution Engine (Taskt-inspired)"
    description: "Implement keystroke and type_text using pyautogui in src/engine/actions.py."
    prerequisites: []
    inputs: []
    outputs:
      - src/engine/actions.py
      - tests/test_actions.py
    tdd_instructions: |
      1. Add tests in tests/test_actions.py for 'type_text(text)' and 'send_keystroke(keys)'.
      2. Mock pyautogui and verify the write and hotkey calls are triggered with correct params.
    implementation_details: |
      - In src/engine/actions.py, implement type_text(text) calling pyautogui.write(text, interval=0.05).
      - Implement send_keystroke(keys) calling pyautogui.hotkey(*keys).
    verification: "pytest tests/test_actions.py"

  # =========================================================================
  # Phase 3: \"Smart\" Triggers (SikuliX-inspired)
  # =========================================================================
  - id: "task-p3-01"
    phase: "Phase 3: \"Smart\" Triggers (SikuliX-inspired)"
    description: "Implement high-speed screen capture using mss."
    prerequisites: []
    inputs: []
    outputs:
      - src/vision/ocr.py
      - tests/test_ocr.py
    tdd_instructions: |
      1. Create tests/test_ocr.py to test 'capture_screen()'.
      2. Verify it returns a numpy image array containing RGB/BGR channels.
    implementation_details: |
      - Create src/vision/ocr.py.
      - Use mss.mss() as a context manager, capture primary monitor, and convert to numpy array.
    verification: "pytest tests/test_ocr.py"

  - id: "task-p3-02"
    phase: "Phase 3: \"Smart\" Triggers (SikuliX-inspired)"
    description: "Integrate Tesseract OCR text extraction."
    prerequisites: ["task-p3-01"]
    inputs:
      - src/vision/ocr.py
    outputs:
      - src/vision/ocr.py
      - tests/test_ocr.py
    tdd_instructions: |
      1. Write a test in tests/test_ocr.py passing a simple mock image with the text 'READY' to 'extract_text(image)'.
      2. Verify the returned string contains the word 'READY'.
    implementation_details: |
      - In src/vision/ocr.py, implement extract_text(image_np) using pytesseract.image_to_string().
    verification: "pytest tests/test_ocr.py"

  - id: "task-p3-03"
    phase: "Phase 3: \"Smart\" Triggers (SikuliX-inspired)"
    description: "Implement wait_for_text polling trigger in runner.py."
    prerequisites: ["task-p2-02", "task-p3-02"]
    inputs:
      - src/engine/runner.py
      - src/vision/ocr.py
    outputs:
      - src/engine/runner.py
      - tests/test_runner.py
    tdd_instructions: |
      1. Write a test in tests/test_runner.py mocking the OCR engine to return empty text for 2 iterations, then return 'Success'.
      2. Call wait_for_text('Success', timeout=5) and verify it returns successfully.
      3. Verify it raises TimeoutError if text is never found.
    implementation_details: |
      - In WorkflowRunner, implement wait_for_ocr(target, timeout).
      - Poll every 500ms using time.sleep(0.5). Throw TimeoutError if time elapsed exceeds timeout.
    verification: "pytest tests/test_runner.py"

  - id: "task-p3-04"
    phase: "Phase 3: \"Smart\" Triggers (SikuliX-inspired)"
    description: "Implement copy_and_match clipboard text using pyperclip."
    prerequisites: []
    inputs: []
    outputs:
      - src/engine/actions.py
      - tests/test_actions.py
    tdd_instructions: |
      1. Add test for 'copy_and_match(regex_pattern)' in tests/test_actions.py.
      2. Mock pyperclip.paste() to return a string 'ErrorCode: 404 Not Found'.
      3. Verify that matching with r'ErrorCode:\s*(\d+)' extracts and returns group '404'.
    implementation_details: |
      - In src/engine/actions.py, implement copy_and_match(pattern).
      - Get clipboard text via pyperclip.paste(), apply re.search(pattern, text), and return matched groups.
    verification: "pytest tests/test_actions.py"

  # =========================================================================
  # Phase 4: Global Hotkeys & OS Integration
  # =========================================================================
  - id: "task-p4-01"
    phase: "Phase 4: Global Hotkeys & OS Integration"
    description: "Implement register_hotkey using keyboard module."
    prerequisites: []
    inputs: []
    outputs:
      - src/utils/hotkeys.py
      - tests/test_hotkeys.py
    tdd_instructions: |
      1. Create tests/test_hotkeys.py verifying 'register_hotkey(hotkey_str, callback)'.
      2. Mock the keyboard library and verify that keyboard.add_hotkey is triggered with correct arguments.
    implementation_details: |
      - Create src/utils/hotkeys.py.
      - Wrap keyboard.add_hotkey and handle clean exceptions if hotkey registration fails.
    verification: "pytest tests/test_hotkeys.py"

  - id: "task-p4-02"
    phase: "Phase 4: Global Hotkeys & OS Integration"
    description: "Link global hotkeys to spawn and start WorkflowRunner."
    prerequisites: ["task-p2-02", "task-p4-01"]
    inputs:
      - src/utils/hotkeys.py
      - main.py
    outputs:
      - src/utils/hotkeys.py
      - main.py
      - tests/test_hotkeys.py
    tdd_instructions: |
      1. Write a test verifying that when a registered hotkey callback fires, a QThread WorkflowRunner is instantiated and started.
    implementation_details: |
      - In main.py, when a hotkey fires, use a thread-safe connection to trigger a slot in the main Qt thread that instantiates and runs WorkflowRunner.
    verification: "pytest tests/test_hotkeys.py"

  - id: "task-p4-03"
    phase: "Phase 4: Global Hotkeys & OS Integration"
    description: "Implement QSystemTrayIcon and minimize behavior."
    prerequisites: ["task-p1-01"]
    inputs: []
    outputs:
      - src/ui/tray_icon.py
      - tests/test_tray_icon.py
    tdd_instructions: |
      1. Create tests/test_tray_icon.py verifying that SystemTrayIcon is initialized with standard menu options (Restore, Exit).
      2. Verify that close events on MainWindow minimize the window instead of closing the application.
    implementation_details: |
      - Create src/ui/tray_icon.py wrapping QSystemTrayIcon.
      - Override closeEvent in MainWindow to ignore the close event and hide the window instead.
    verification: "pytest tests/test_tray_icon.py"

  # =========================================================================
  # Phase 5: Packaging and Distribution
  # =========================================================================
  - id: "task-p5-01"
    phase: "Phase 5: Packaging and Distribution"
    description: "Create PyInstaller spec file autoflow.spec."
    prerequisites: []
    inputs: []
    outputs:
      - autoflow.spec
    tdd_instructions: |
      1. Write a test/check verifying the existence of autoflow.spec.
      2. Verify the spec file references PySide6 binaries and correctly sets the console value to False.
    implementation_details: |
      - Create autoflow.spec with pyi-makespec or write it manually to specify correct hooks and console settings.
    verification: "python -c \"import os; assert os.path.exists('autoflow.spec')\""

  - id: "task-p5-02"
    phase: "Phase 5: Packaging and Distribution"
    description: "Configure local fallback path for Tesseract binary."
    prerequisites: ["task-p3-02"]
    inputs:
      - src/vision/ocr.py
    outputs:
      - src/vision/ocr.py
      - tests/test_ocr.py
    tdd_instructions: |
      1. Add a test in tests/test_ocr.py verifying that if a local binary is found at bin/tesseract/tesseract.exe, pytesseract.pytesseract.tesseract_cmd is updated to that path.
    implementation_details: |
      - In src/vision/ocr.py, check if bin/tesseract/tesseract.exe exists. If yes, assign its path to pytesseract.pytesseract.tesseract_cmd.
    verification: "pytest tests/test_ocr.py"